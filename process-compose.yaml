version: "0.5"

processes:
  web:
    command: >-
      sh -lc 'mkdir -p logs && cargo run -p axiomsync -- --root .axiomsync serve --addr 127.0.0.1:4400 >> logs/web.log 2>&1'
    availability:
      restart: on_failure
  mcp_http:
    command: >-
      sh -lc 'mkdir -p logs && cargo run -p axiomsync -- --root .axiomsync mcp serve --transport http --addr 127.0.0.1:4401 >> logs/mcp_http.log 2>&1'
    availability:
      restart: on_failure
